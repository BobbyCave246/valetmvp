<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My booking — Store All Valet</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="siteHeader"></div>

  <main>
    <div id="confirmBanner"></div>

    <div class="card">
      <h2>Find my booking</h2>
      <p class="muted">No login needed — look up by booking reference or phone number.</p>
      <label for="lookup">Booking reference or phone</label>
      <div class="flex">
        <input type="text" id="lookup" placeholder="book_xxxx or 555-0123" />
        <button class="btn" id="lookupBtn">Look up</button>
        <button class="btn ghost" id="scanLookupBtn">📷 Scan a bin</button>
      </div>
    </div>

    <div id="result" aria-live="polite"></div>
  </main>
  <div id="toast" role="status" aria-live="polite"></div>
  <script src="/shared/esc.js"></script>
  <script src="nav.js"></script>
  <script>
    document.getElementById('siteHeader').innerHTML = CustomerNav.renderHeader({ active: 'track' });
    CustomerNav.bindNav();
  </script>
  <script src="/shared/barcode.js"></script>
  <script src="/vendor/html5-qrcode.min.js"></script>
  <script src="/shared/scanner.js"></script>
  <script src="booking.js"></script>
</body>
</html>
