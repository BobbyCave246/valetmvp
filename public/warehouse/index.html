<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warehouse scan — Store All Valet</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>🏭 Warehouse scan</h1>
    <span class="spacer"></span>
  </header>

  <main>
    <section id="modeView">
      <button class="mode-btn" id="modePutaway">
        <span class="mode-icon">📥</span>
        <span class="mode-label">Put away</span>
        <span class="mode-sub">Scan bin → scan rack location</span>
      </button>
      <button class="mode-btn" id="modePullout">
        <span class="mode-icon">📤</span>
        <span class="mode-label">Pull out</span>
        <span class="mode-sub">Scan bin to pull it from the rack</span>
      </button>
      <button class="mode-btn" id="modeIntake">
        <span class="mode-icon">🆕</span>
        <span class="mode-label">Add new bins</span>
        <span class="mode-sub">Scan newly purchased bins into the pool</span>
      </button>
    </section>

    <section id="flowView" hidden>
      <button class="back" id="backBtn">‹ Modes</button>
      <div id="flowBody"></div>
    </section>
  </main>

  <div id="toast"></div>
  <script src="/shared/esc.js"></script>
  <script src="/shared/session.js"></script>
  <script src="/shared/client.js"></script>
  <script src="/shared/barcode.js"></script>
  <script src="/vendor/html5-qrcode.min.js"></script>
  <script src="/shared/scanner.js"></script>
  <script src="app.js"></script>
</body>
</html>
